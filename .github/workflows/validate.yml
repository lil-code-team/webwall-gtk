name: Validate Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Build project
        run: gcc wallpaper.c -o wallpaper `pkg-config --cflags --libs gtk+-3.0 gtk-layer-shell-0 webkit2gtk-4.0`

      - name: Check build artifacts
        run: |
          test -f wallpaper || exit 1
          file wallpaper
          ls -lh wallpaper

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: wallpaper-validation
          path: wallpaper
          retention-days: 5
