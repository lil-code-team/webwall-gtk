name: Validate Build

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            pkg-config

          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
            echo "WEBKIT_PKG=webkit2gtk-4.1" >> "$GITHUB_ENV"
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
            echo "WEBKIT_PKG=webkit2gtk-4.0" >> "$GITHUB_ENV"
          fi

      - name: Build project
        run: gcc wallpaper.c -o wallpaper `pkg-config --cflags --libs gtk+-3.0 gtk-layer-shell-0 $WEBKIT_PKG`

      - name: Check build artifacts
        run: |
          test -f wallpaper || exit 1
          file wallpaper
          ls -lh wallpaper

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallpaper-validation
          path: wallpaper
          retention-days: 5
