name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.new_version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Build project
        run: gcc wallpaper.c -o wallpaper `pkg-config --cflags --libs gtk+-3.0 gtk-layer-shell-0 webkit2gtk-4.0`

      - name: Generate version
        id: version
        run: |
          # Get last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          # Parse version
          VERSION=${LAST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Increment patch version
          PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallpaper-build
          path: |
            wallpaper
            index.html
            index.example.html

  release:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: wallpaper-build

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.build.outputs.version }}
          release_name: Release ${{ needs.build.outputs.version }}
          body: |
            ## Changelog
            - Build date: ${{ github.event.head_commit.timestamp }}
            - Commit: ${{ github.sha }}

            ### Assets
            - **wallpaper**: Executável do aplicativo
            - **index.html**: Interface web configurável
            - **wallpaper-src.tar.gz**: Código-fonte completo
          draft: false
          prerelease: false

      - name: Upload executable
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./wallpaper
          asset_name: wallpaper
          asset_content_type: application/octet-stream

      - name: Upload index.html
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./index.html
          asset_name: index.html
          asset_content_type: text/html

      - name: Upload example config
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./index.example.html
          asset_name: index.example.html
          asset_content_type: text/html

      - name: Create source archive
        run: |
          tar --exclude='.git' --exclude='.github' -czf wallpaper-src.tar.gz .

      - name: Upload source archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./wallpaper-src.tar.gz
          asset_name: wallpaper-src-${{ needs.build.outputs.version }}.tar.gz
          asset_content_type: application/gzip

      - name: Add labels to release
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: '${{ needs.build.outputs.version }}'
            });

            console.log('Release created:', release.data.html_url);
            console.log('Assets:');
            release.data.assets.forEach(asset => {
              console.log(`  - ${asset.name} (${asset.download_count} downloads)`);
            });
