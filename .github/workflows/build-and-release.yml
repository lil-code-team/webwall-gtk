name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.new_version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            pkg-config

          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
            echo "WEBKIT_PKG=webkit2gtk-4.1" >> "$GITHUB_ENV"
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
            echo "WEBKIT_PKG=webkit2gtk-4.0" >> "$GITHUB_ENV"
          fi

      - name: Build project
        run: gcc wallpaper.c -o wallpaper `pkg-config --cflags --libs gtk+-3.0 gtk-layer-shell-0 $WEBKIT_PKG`

      - name: Generate version
        id: version
        run: |
          # Get last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          # Parse version
          VERSION=${LAST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Increment patch version
          PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallpaper-build
          path: |
            wallpaper
            index.html
            index.example.html

  release:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: wallpaper-build
          path: dist

      - name: Create source archive
        run: |
          git archive --format=tar.gz --output=wallpaper-src.tar.gz HEAD

      - name: Create or update release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          NOTES=$(cat <<'EOF'
          ## Changelog
          - Build date: ${{ github.event.head_commit.timestamp }}
          - Commit: ${{ github.sha }}

          ### Assets
          - **wallpaper**: Executável do aplicativo
          - **index.html**: Interface web configurável
          - **wallpaper-src.tar.gz**: Código-fonte completo
          EOF
          )

          if ! gh release view "$VERSION" >/dev/null 2>&1; then
            gh release create "$VERSION" --title "Release $VERSION" --notes "$NOTES"
          fi

          ASSETS=()
          for file in dist/wallpaper dist/index.html dist/index.example.html; do
            if [ -f "$file" ]; then
              ASSETS+=("$file")
            fi
          done

          mv wallpaper-src.tar.gz "wallpaper-src-${VERSION}.tar.gz"
          ASSETS+=("wallpaper-src-${VERSION}.tar.gz")

          gh release upload "$VERSION" "${ASSETS[@]}" --clobber

      - name: Add labels to release
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: '${{ needs.build.outputs.version }}'
            });

            console.log('Release created:', release.data.html_url);
            console.log('Assets:');
            release.data.assets.forEach(asset => {
              console.log(`  - ${asset.name} (${asset.download_count} downloads)`);
            });
