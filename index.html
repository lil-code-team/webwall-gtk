<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallpaper - Configuracao</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: sans-serif;
        background: #111;
        color: #f1f1f1;
      }

      .container {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .box {
        max-width: 720px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        padding: 24px;
      }

      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 12px;
        display: block;
      }

      code {
        display: block;
        margin-top: 12px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 6px;
        color: #ffd166;
        word-break: break-all;
      }

      a {
        color: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="box">
        <img
          class="logo"
          src="https://lilcode.team/favicon.ico"
          alt="lilcode.team logo"
        />
        <h1>Wallpaper HTML</h1>
        <p>Edite o arquivo abaixo para configurar o wallpaper:</p>
        <code>~/.config/wallpaper/index.html</code>
        <p>
          Developed by
          <a href="https://lilcode.team">lilcode.team</a>
        </p>
      </section>
    </main>
  </body>
</html>
