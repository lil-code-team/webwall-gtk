<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Clock</title>
    <style>
      :root {
        --bg-1: #05060a;
        --bg-2: #10182b;
        --glow: #37f7ff;
        --text: #e9fcff;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        background: radial-gradient(
          circle at 30% 30%,
          var(--bg-2),
          var(--bg-1)
        );
        color: var(--text);
        font-family: "Courier New", monospace;
      }

      .panel {
        text-align: center;
        padding: 32px 40px;
        border: 1px solid rgba(55, 247, 255, 0.25);
        border-radius: 16px;
        background: rgba(8, 12, 24, 0.62);
        backdrop-filter: blur(5px);
        box-shadow: 0 0 40px rgba(55, 247, 255, 0.12);
      }

      .time {
        font-size: clamp(56px, 14vw, 140px);
        letter-spacing: 0.08em;
        color: var(--glow);
        text-shadow:
          0 0 8px rgba(55, 247, 255, 0.7),
          0 0 20px rgba(55, 247, 255, 0.35);
      }

      .date {
        margin-top: 12px;
        font-size: clamp(14px, 2.8vw, 26px);
        letter-spacing: 0.08em;
        opacity: 0.9;
      }

      .pulse {
        animation: pulse 1.4s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div id="time" class="time">00:00:00</div>
      <div id="date" class="date">---</div>
    </div>

    <script>
      const timeEl = document.getElementById("time");
      const dateEl = document.getElementById("date");

      function updateClock() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, "0");
        const mm = String(now.getMinutes()).padStart(2, "0");
        const ss = String(now.getSeconds()).padStart(2, "0");

        timeEl.innerHTML = `${hh}<span class="pulse">:</span>${mm}<span class="pulse">:</span>${ss}`;
        dateEl.textContent = now.toLocaleDateString(undefined, {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "2-digit",
        });
      }

      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
