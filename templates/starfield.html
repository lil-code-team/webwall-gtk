<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starfield</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #02030a;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="stars"></canvas>
    <script>
      const canvas = document.getElementById("stars");
      const ctx = canvas.getContext("2d");
      let stars = [];

      function resize() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
        init();
      }

      function init() {
        stars = [];
        const count = Math.floor((canvas.width * canvas.height) / 3800);
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            z: Math.random() * canvas.width,
          });
        }
      }

      function frame() {
        ctx.fillStyle = "rgba(2, 3, 10, 0.35)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        for (const s of stars) {
          s.z -= 4;
          if (s.z <= 1) {
            s.x = Math.random() * canvas.width;
            s.y = Math.random() * canvas.height;
            s.z = canvas.width;
          }

          const sx = (s.x - cx) * (canvas.width / s.z) + cx;
          const sy = (s.y - cy) * (canvas.width / s.z) + cy;
          const r = Math.max(0.5, (1 - s.z / canvas.width) * 3.2);
          const a = Math.min(1, (1 - s.z / canvas.width) * 1.3);

          if (sx < 0 || sx >= canvas.width || sy < 0 || sy >= canvas.height) {
            s.z = canvas.width;
            continue;
          }

          ctx.beginPath();
          ctx.fillStyle = `rgba(188, 225, 255, ${a})`;
          ctx.arc(sx, sy, r, 0, Math.PI * 2);
          ctx.fill();
        }

        requestAnimationFrame(frame);
      }

      resize();
      window.addEventListener("resize", resize);
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
